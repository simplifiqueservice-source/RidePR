<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RidePR Admin MVP</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>RidePR Admin MVP</h1>
        <p>Cliente web simples para testar o backend.</p>
      </div>
      <button id="clearTokenButton" type="button">Limpar token</button>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Login admin</h2>
        <label>
          API baseUrl
          <input id="baseUrl" value="http://192.168.0.10:5090" />
        </label>
        <label>
          E-mail
          <input id="email" value="admin@ridepr.test" autocomplete="username" />
        </label>
        <label>
          Senha
          <input id="password" value="Senha123!" type="password" autocomplete="current-password" />
        </label>
        <button id="loginButton" type="button">Login</button>
        <p id="tokenStatus" class="muted">Sem token em memoria.</p>
      </section>

      <section class="panel">
        <h2>Listagens</h2>
        <div class="button-grid">
          <button data-list="/api/users">Listar usuarios</button>
          <button data-list="/api/drivers">Listar motoristas</button>
          <button data-list="/api/vehicles">Listar veiculos</button>
          <button data-list="/api/passengers">Listar passageiros</button>
          <button data-list="/api/trips">Listar corridas</button>
        </div>
      </section>

      <section class="panel wide">
        <h2>Criar corrida de teste</h2>
        <div class="grid">
          <label>
            PassengerId
            <input id="passengerId" placeholder="GUID do passageiro" />
          </label>
          <label>
            TripId
            <input id="tripId" placeholder="preenchido ao criar corrida" />
          </label>
          <label>
            Origem
            <input id="origin" value="Praca da Se, Sao Paulo" />
          </label>
          <label>
            Destino
            <input id="destination" value="Avenida Paulista, Sao Paulo" />
          </label>
          <label>
            Lat origem
            <input id="originLatitude" value="-23.55052" />
          </label>
          <label>
            Lng origem
            <input id="originLongitude" value="-46.63331" />
          </label>
          <label>
            Lat destino
            <input id="destinationLatitude" value="-23.56141" />
          </label>
          <label>
            Lng destino
            <input id="destinationLongitude" value="-46.65588" />
          </label>
        </div>
        <div class="button-row">
          <button id="createTripButton" type="button">Criar corrida</button>
          <button id="getTripButton" type="button">Buscar status</button>
        </div>
      </section>

      <section class="panel wide">
        <h2>Acoes de corrida</h2>
        <div class="grid">
          <label>
            DriverId manual
            <input id="driverId" placeholder="GUID do motorista" />
          </label>
          <label>
            Raio dispatch km
            <input id="radiusKm" value="5" />
          </label>
          <label>
            Distancia final km
            <input id="actualDistanceKm" value="4.2" />
          </label>
          <label>
            Duracao final min
            <input id="actualDurationMinutes" value="18" />
          </label>
        </div>
        <div class="button-row">
          <button id="requestDispatchButton" type="button">Solicitar dispatch</button>
          <button id="acceptTripButton" type="button">Aceitar</button>
          <button id="startTripButton" type="button">Iniciar</button>
          <button id="finishTripButton" type="button">Finalizar</button>
        </div>
      </section>

      <section class="panel response wide">
        <h2>Resposta JSON</h2>
        <pre id="responseBox">Nenhuma chamada executada ainda.</pre>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
